<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام عرض درجات الطلاب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-search {
            background: #667eea;
            color: white;
        }
        
        .btn-search:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-back {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-back:hover {
            background: #d0d0d0;
        }
        
        .results {
            display: none;
        }
        
        .results.active {
            display: block;
        }
        
        .student-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-right: 4px solid #667eea;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .info-row:last-child {
            margin-bottom: 0;
        }
        
        .info-label {
            color: #666;
            font-weight: 600;
        }
        
        .info-value {
            color: #333;
            font-weight: 600;
        }
        
        .grades-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        
        .grades-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: right;
            font-size: 14px;
        }
        
        .grades-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        
        .grades-table tr:last-child td {
            border-bottom: none;
        }
        
        .subject-name {
            font-weight: 600;
            color: #333;
        }
        
        .grade {
            text-align: center;
            font-weight: 700;
            font-size: 16px;
        }
        
        .grade.excellent {
            color: #28a745;
        }
        
        .grade.good {
            color: #667eea;
        }
        
        .grade.average {
            color: #ffc107;
        }
        
        .grade.low {
            color: #dc3545;
        }
        
        .not-found {
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #ffeaa7;
            text-align: center;
        }
        
        .not-found.active {
            display: block;
        }
        
        .grade-header {
            margin-bottom: 15px;
            text-align: center;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 نظام عرض الدرجات</h1>
            <p>ادخل بيانتك لعرض درجاتك</p>
        </div>
        
        <!-- نموذج البحث -->
        <div class="form-section active">
            <div class="form-group">
                <label for="studentName">اسم الطالب:</label>
                <input type="text" id="studentName" placeholder="">
            </div>
            
            <div class="form-group">
                <label for="examNumber">الرقم الامتحاني:</label>
                <input type="number" id="examNumber" placeholder="">
            </div>
            
            <div class="form-group">
                <label for="studyType">نوع الدراسة:</label>
                <select id="studyType">
                    <option value="">-- اختر --</option>
                    <option value="صباحي">صباحي</option>
                    <option value="مسائي">مسائي</option>
                </select>
            </div>
            
            <div class="button-group">
                <button class="btn-search" onclick="searchStudent()">عرض درجاتي</button>
            </div>
        </div>
        
        <!-- النتائج -->
        <div class="results">
            <div class="student-info">
                <div class="info-row">
                    <span class="info-label">الاسم:</span>
                    <span class="info-value" id="displayName"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">الرقم الامتحاني:</span>
                    <span class="info-value" id="displayExamNumber"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">نوع الدراسة:</span>
                    <span class="info-value" id="displayStudyType"></span>
                </div>
            </div>
            
            <div class="grade-header">
                📋 درجات المواد (السعي 50%)
            </div>
            
            <table class="grades-table">
                <thead>
                    <tr>
                        <th>المادة</th>
                        <th>الدرجة</th>
                    </tr>
                </thead>
                <tbody id="gradesBody">
                </tbody>
            </table>
            
            <div class="not-found" id="notFound">
                لم يتم العثور على بيانات للطالب. الرجاء التحقق من البيانات المدخلة.
            </div>
            
            <div class="button-group" style="margin-top: 25px;">
                <button class="btn-back" onclick="goBack()">رجوع</button>
            </div>
        </div>
    </div>

        function searchStudent() {
            const name = document.getElementById('studentName').value.trim();
            const examNumber = parseInt(document.getElementById('examNumber').value);
            const studyType = document.getElementById('studyType').value;
            
            // التحقق من إدخال البيانات
            if (!name || !examNumber || !studyType) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }
            
            // البحث عن الطالب
            const student = studentsDatabase[name];
            
            if (student && student.exam_number === examNumber && student.study_type === studyType) {
                displayResults(student);
            } else {
                showNotFound();
            }
        }
        
        function displayResults(student) {
            const name = document.getElementById('studentName').value.trim();
            
            // إظهار بيانات الطالب
            document.getElementById('displayName').textContent = name;
            document.getElementById('displayExamNumber').textContent = student.exam_number;
            document.getElementById('displayStudyType').textContent = student.study_type;
            
            // ملء جدول الدرجات
            const gradesBody = document.getElementById('gradesBody');
            gradesBody.innerHTML = '';
            
            for (const [subject, grade] of Object.entries(student.grades)) {
                const row = document.createElement('tr');
                let gradeClass = '';
                
                if (grade >= 40) gradeClass = 'excellent';
                else if (grade >= 30) gradeClass = 'good';
                else if (grade >= 20) gradeClass = 'average';
                else gradeClass = 'low';
                
                row.innerHTML = `
                    <td class="subject-name">${subject}</td>
                    <td class="grade ${gradeClass}">${grade}</td>
                `;
                gradesBody.appendChild(row);
            }
            
            // إظهار النتائج وإخفاء النموذج
            document.querySelector('.form-section').classList.remove('active');
            document.querySelector('.results').classList.add('active');
            document.getElementById('notFound').classList.remove('active');
        }
        
        function showNotFound() {
            document.querySelector('.form-section').classList.remove('active');
            document.querySelector('.results').classList.add('active');
            document.getElementById('notFound').classList.add('active');
        }
        
        function goBack() {
            document.querySelector('.form-section').classList.add('active');
            document.querySelector('.results').classList.remove('active');
            document.getElementById('studentName').value = '';
            document.getElementById('examNumber').value = '';
            document.getElementById('studyType').value = '';
        }
        
        // السماح بالبحث عند الضغط على Enter
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('examNumber').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchStudent();
            });
        });
    </script>
